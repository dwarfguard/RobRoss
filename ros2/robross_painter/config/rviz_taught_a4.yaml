# SIM-ONLY profile for RViz fake-hardware tests with a canvas taught via
# teach_canvas.py on an arbitrary plane (wall, table, ground, slanted
# stand). No global ground plane and relaxed base-axis guards so canvases
# taught anywhere around the robot still plan; NEVER use this profile on
# real hardware - use hardware_a4.yaml there.
#
# Launch with the taught pose layered on top:
#   ros2 launch robross_painter paint.launch.py \
#     calibration_file:=<this file> \
#     canvas_file:=<teach_canvas output yaml> \
#     paths_file:=...
painting_executor:
  ros__parameters:
    # Fallback canvas pose, overridden by the taught canvas_file.
    canvas_origin_xyz: [0.55, 0.105, 0.55]
    canvas_quat_xyzw: [0.5, -0.5, 0.5, -0.5]
    # Measured claw + pen; keep identical to hardware_a4.yaml.
    tool_offset_xyz: [0.0, -0.0595, 0.0514]
    tool_offset_rpy: [0.0, 0.0, 0.0]
    tool_spin_deg: -90.0
    # No 4x4 m ground box; the auto-sized backing patch below protects the
    # surface directly under the paper at any tilt.
    ground_enabled: false
    ground_z_m: -0.005
    canvas_backing_enabled: true
    canvas_backing_clearance_m: 0.005
    canvas_backing_size_xy_m: [0.0, 0.0]     # auto: canvas + margin
    canvas_backing_margin_m: 0.05
    claw_collision_size_xyz: [0.02, 0.06, 0.02]
    claw_collision_offset_xyz: [0.0, -0.03, 0.0]
    safe_clearance_m: 0.02
    velocity_scaling: 0.3
    acceleration_scaling: 0.3
    eef_step_m: 0.005
    cartesian_jump_threshold: 2.0
    joint_states_topic: /joint_states
    state_validity_service: /check_state_validity
    elbow_up_enabled: true
    elbow_joint: foreArm_joint
    elbow_up_min_deg: -5.0
    elbow_up_max_deg: 175.0
    # Relaxed for sim: a taught canvas may sit anywhere around the robot,
    # so allow wide base swings that the hardware profiles reject.
    guarded_joints: [shoulder_joint, wrist3_joint]
    max_guarded_joint_goal_delta_deg: 175.0
    max_guarded_joint_travel_deg: 210.0
    max_guarded_joint_paint_travel_deg: 120.0
    max_guarded_joint_step_deg: 45.0
    max_cartesian_deviation_mm: 2.0
    max_cartesian_normal_deviation_mm: 0.2
    max_cartesian_orientation_deviation_deg: 2.0
    max_execution_tip_error_mm: 1.0
    max_execution_tip_orientation_error_deg: 1.0
    totg_path_tolerance: 0.01
    controller_sample_dt: 0.005
    dry_run: false
