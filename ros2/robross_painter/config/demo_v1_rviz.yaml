# RobRoss Demo v1 hardware/calibration profile for RViz (fake hardware) testing.
#
# This is deliberately separate from the artwork configs in the RobRoss repo:
# artwork/path files stay in canvas millimeters; everything robot-specific
# (paper pose, heights, speeds) lives here. For a real paper setup, replace
# canvas_origin_xyz / canvas_x_yaw_deg with values measured from taught
# paper corners.
painting_executor:
  ros__parameters:
    # Pose of the paper's top-left corner in base_link (meters).
    # z is the pen contact height. Default: A4 portrait lying flat,
    # centered 0.45 m in front of the robot, top edge away from the base.
    canvas_origin_xyz: [0.5985, 0.105, 0.15]
    # Direction of the canvas x axis (page "right") in the base XY plane,
    # degrees. -90 means canvas x runs along base -y; combined with the
    # origin above, the drawing appears unmirrored when viewed from above
    # in RViz with base +x pointing up.
    canvas_x_yaw_deg: -90.0
    # Pen hover height above the paper for travel moves (meters).
    safe_clearance_m: 0.02
    # Top of the ground collision plane in base_link z (meters). Planning
    # rejects any motion where an arm link would pass below this. Slightly
    # negative so the robot's own base, resting at z=0, is not flagged as
    # permanently in collision. Match this to the real mounting surface.
    ground_z_m: -0.005
    # Collision plane just behind the paper (wall / board / table top).
    # Disabled for this fake-hardware profile: with a zero tool offset,
    # ee_link itself is the pen tip, so the wrist sits right at the paper
    # plane and a backing plane would always be in collision. Enable it on
    # real hardware where the claw provides standoff.
    canvas_backing_enabled: false
    canvas_backing_clearance_m: 0.005
    # Pen tip pose in ee_link (custom claw). Zero for the RViz demo:
    # ee_link is treated as the pen tip.
    tool_offset_xyz: [0.0, 0.0, 0.0]
    tool_offset_rpy: [0.0, 0.0, 0.0]
    # Rotation of the claw about the pen axis, degrees. -90 reproduces the
    # wrist orientation of the earlier tool_rpy: [pi, 0, 0] setting.
    tool_spin_deg: -90.0
    # Stand-in collision box for the claw, attached to ee_link
    # (size [0,0,0] disables it; not needed without a claw model).
    claw_collision_size_xyz: [0.0, 0.0, 0.0]
    claw_collision_offset_xyz: [0.0, 0.0, 0.0]
    velocity_scaling: 0.3
    acceleration_scaling: 0.3
    # Cartesian interpolation resolution (meters).
    eef_step_m: 0.005
    # Reject Cartesian paths whose consecutive IK solutions jump more than
    # this factor times the average joint step (an arm configuration flip).
    # Never set to 0: that disables the check and a flip executes as the
    # arm sweeping through unchecked space (self/ground collision).
    cartesian_jump_threshold: 2.0
    # true = plan everything but do not execute.
    dry_run: false
